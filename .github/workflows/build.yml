name: Build

on:
  push:
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'

jobs:
  check-web-tiers:
    name: Check Web Tier Directories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check web source tiers
        run: node scripts/check-web-tiers.js

  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    needs: check-web-tiers
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build subscriptions
        run: |
          rm -rf v1
          node scripts/build-subs.js --out-dir v1

      - name: Validate source JSON
        run: |
          # Fail this step if any source file is invalid
          find subs -type f -name "*.json" -print0 | while IFS= read -r -d '' file; do
            echo "Validating $file"
            jq empty "$file"
          done

      - name: Validate generated JSON
        run: |
          # Fail this step if any generated file is invalid
          find v1 -type f -name "*.json" -print0 | while IFS= read -r -d '' file; do
            echo "Validating $file"
            jq empty "$file"
          done

      - name: Upload generated subscriptions
        uses: actions/upload-artifact@v4
        with:
          name: generated-subscriptions
          path: |
            v1/css1.json
            v1/bt1.json

      # Only upload on push to main in the upstream repository
      - name: Upload to R2
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !github.event.repository.fork }}
        uses: ryand56/r2-upload-action@v1.3.2
        with:
          r2-secret-access-key: ${{ secrets.R2_ACCESS_SECRET_KEY }}
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-bucket: sub
          source-dir: ./v1
          destination-dir: ./
